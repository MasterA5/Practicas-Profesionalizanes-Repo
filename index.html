<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
        }
    
        h1{
            position: absolute;
            top: 30px;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
    
        form{
            background: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    
        input{
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: 0.3s;
        }
    
        input:focus{
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.3);
        }
    
        input[type="submit"]{
            background: #6366f1;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
    
        input[type="submit"]:hover{
            background: #4f46e5;
        }
    </style>
</head>
<body>
    <h1>Formulario de inscripcion</h1>
    <form action="insertar.php" method="POST">
        <input type="text" placeholder="Nombre y Apellido" name="Nombre_y_Apellido">
        <input type="number" placeholder="DNI" name="dni">
        <input type="date" name="Fecha De Nacimiento">
        <input type="text" placeholder="Direccion" name="Direccion">
        <input type="text" placeholder="Celular" name="Celular">
        <input type="email" placeholder="Email" name="Email">
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
